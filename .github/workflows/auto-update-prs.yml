# Workflow name
name: Auto Update Pull Requests

# Trigger: runs when code is pushed to the 'main' branch
on:
  push:
    branches:
      - main  # If your main branch is called 'master', change this line

jobs:
  auto-update:
    # Runs on GitHub's servers
    runs-on: ubuntu-latest
    steps:
      # This is the replacement action
      - uses: heavy-duty/auto-update-pull-request@v1
        with:
          # This token gives the action permission to update the PR.
          # You don't need to change this line.
          github-token: ${{ secrets.GITHUB_TOKEN }}
